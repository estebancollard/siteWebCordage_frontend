    <!-- Vertical strings, every 30px -->
    <line x1="242" y1="80" x2="242" y2="680"/>
    <line x1="272" y1="80" x2="272" y2="680"/>
    <line x1="302" y1="80" x2="302" y2="680"/>
    <line x1="332" y1="80" x2="332" y2="680"/>
    <line x1="362" y1="80" x2="362" y2="680"/>
    <line x1="392" y1="80" x2="392" y2="680"/>
    <line x1="422" y1="80" x2="422" y2="680"/>
    <line x1="452" y1="80" x2="452" y2="680"/>
    <line x1="482" y1="80" x2="482" y2="680"/>
    <line x1="512" y1="80" x2="512" y2="680"/>
    <line x1="542" y1="80" x2="542" y2="680"/>
    <line x1="572" y1="80" x2="572" y2="680"/>
    <line x1="602" y1="80" x2="602" y2="680"/>
    <line x1="632" y1="80" x2="632" y2="680"/>
