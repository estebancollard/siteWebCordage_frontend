    <line x1="752" y1="80" x2="752" y2="680"/>
    <line x1="782" y1="80" x2="782" y2="680"/>

    <!-- Horizontal strings -->
    <line x1="212" y1="110" x2="812" y2="110"/>
    <line x1="212" y1="140" x2="812" y2="140"/>
    <line x1="212" y1="170" x2="812" y2="170"/>
    <line x1="212" y1="200" x2="812" y2="200"/>
    <line x1="212" y1="230" x2="812" y2="230"/>
    <line x1="212" y1="260" x2="812" y2="260"/>
    <line x1="212" y1="290" x2="812" y2="290"/>
    <line x1="212" y1="320" x2="812" y2="320"/>
    <line x1="212" y1="350" x2="812" y2="350"/>
    <line x1="212" y1="380" x2="812" y2="380"/>
    <line x1="212" y1="410" x2="812" y2="410"/>
    <line x1="212" y1="440" x2="812" y2="440"/>
    <line x1="212" y1="470" x2="812" y2="470"/>
    <line x1="212" y1="500" x2="812" y2="500"/>
    <line x1="212" y1="530" x2="812" y2="530"/>
    <line x1="212" y1="560" x2="812" y2="560"/>
    <line x1="212" y1="590" x2="812" y2="590"/>
    <line x1="212" y1="620" x2="812" y2="620"/>
    <line x1="212" y1="650" x2="812" y2="650"/>
  </g>

  <!-- Diamond outline -->
  <polygon points="512,80 812,380 512,680 212,380"
           fill="none" stroke="#000000" stroke-width="22" stroke-linejoin="round"/>

  <!-- SC wordmark -->
  <text x="512" y="900"
        text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="180"
        font-weight="700"
        letter-spacing="12"
        fill="#000000">SC</text>
</svg>
